<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heart Storyboard Animation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #000000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .center-text {
      position: absolute;
      z-index: 10;
      color: #ffffff;
      font-size: 2.8rem;
      font-weight: 800;
      text-align: center;
      letter-spacing: 2px;
      pointer-events: none;
      opacity: 0;
      text-shadow: 
        0 0 10px rgba(255, 23, 68, 0.9),
        0 0 20px rgba(255, 23, 68, 0.9),
        0 0 40px rgba(255, 0, 85, 0.8);
      animation: fadeInOut 6.5s ease-in-out forwards;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: scale(0.5); }
      20% { opacity: 1; transform: scale(1); }
      75% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0; transform: scale(1.2); }
    }
  </style>
</head>
<body>

  <div class="container">
    <canvas id="canvas"></canvas>
    <h1 class="center-text">ເຟັນຟາຍ.</h1>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height, centerX, centerY, scale;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      centerX = width / 2;
      centerY = height / 2 - 15;
      scale = Math.min(width, height) / 35;
    }
    resize();
    window.addEventListener('resize', resize);

    function getHeartPosition(t) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
      return { x, y };
    }

    let phase = 1; // 1: Heart (0-5s), 2: River (5-9s), 3: Heart Rain (9s+)
    const startTime = Date.now();

    class Particle {
      constructor(index, total) {
        this.index = index;
        this.total = total;
        this.resetHeart();
      }

      resetHeart() {
        const t = (this.index / this.total) * Math.PI * 2;
        const pos = getHeartPosition(t);
        const spread = (Math.random() - 0.5) * 20;
        
        this.targetX = centerX + pos.x * scale + spread;
        this.targetY = centerY + pos.y * scale + spread;

        this.x = centerX + (Math.random() - 0.5) * width;
        this.y = centerY + (Math.random() - 0.5) * height;

        this.size = Math.random() * 2 + 1;
        this.speed = Math.random() * 0.03 + 0.02;
        this.alpha = Math.random() * 0.8 + 0.2;
        
        this.riverAngle = (this.index / this.total) * Math.PI * 4;
        this.riverRadius = Math.random() * 80 + 100;
        
        const colors = ['#ff2a75', '#ff5395', '#ff75a0', '#ffffff', '#ff9ebe'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }

      update() {
        if (phase === 1) {
          // รวมตัวเป็นรูปหัวใจ
          this.x += (this.targetX - this.x) * this.speed;
          this.y += (this.targetY - this.y) * this.speed;
        } 
        else if (phase === 2) {
          // ไหลเป็นสายน้ำ
          this.riverAngle += 0.03;
          const targetX = centerX + Math.cos(this.riverAngle) * (this.riverRadius + Math.sin(this.riverAngle * 2) * 50);
          const targetY = centerY + Math.sin(this.riverAngle * 1.5) * (this.riverRadius * 0.8);
          
          this.x += (targetX - this.x) * 0.05;
          this.y += (targetY - this.y) * 0.05;
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.shadowColor = '#ff0055';
        ctx.shadowBlur = 6;
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ละอองรูปหัวใจที่จะตกลงมาจากฟ้า (Heart Rain)
    class FallingHeart {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = -20 - Math.random() * 50;
        this.size = Math.random() * 8 + 6; // ขนาดดวงหัวใจ
        this.speedY = Math.random() * 2 + 1.2; // ความเร็วสปีดตกลงมา
        this.speedX = Math.random() * 1 - 0.5; // พลิ้วซ้ายขวา
        this.alpha = Math.random() * 0.7 + 0.3;
        this.swing = Math.random() * 0.05;
        this.swingAngle = Math.random() * Math.PI * 2;
        
        const colors = ['#ff2a75', '#ff4081', '#f50057', '#ff80ab', '#ffffff', '#ff7597'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }

      update() {
        this.swingAngle += this.swing;
        this.x += Math.sin(this.swingAngle) * 0.8 + this.speedX;
        this.y += this.speedY;

        // ถาตกเลยขอบจอให้รีเซ็ตกลับไปตกจากข้างบนใหม่
        if (this.y > height + 20) {
          this.reset();
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.shadowColor = '#ff0055';
        ctx.shadowBlur = 8;

        // วาดรูปทรงหัวใจดวงเล็กๆ
        const topCurveHeight = this.size * 0.3;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + topCurveHeight);
        ctx.bezierCurveTo(
          this.x, this.y, 
          this.x - this.size / 2, this.y, 
          this.x - this.size / 2, this.y + topCurveHeight
        );
        ctx.bezierCurveTo(
          this.x - this.size / 2, this.y + (this.size + topCurveHeight) / 2, 
          this.x, this.y + this.size, 
          this.x, this.y + this.size
        );
        ctx.bezierCurveTo(
          this.x, this.y + this.size, 
          this.x + this.size / 2, this.y + (this.size + topCurveHeight) / 2, 
          this.x + this.size / 2, this.y + topCurveHeight
        );
        ctx.bezierCurveTo(
          this.x + this.size / 2, this.y, 
          this.x, this.y, 
          this.x, this.y + topCurveHeight
        );
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    const particles = [];
    const particleCount = 1000;
    const fallingHearts = [];
    const fallingHeartCount = 120; // จำนวนหัวใจโปรยปรายลงมา

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle(i, particleCount));
    }

    for (let i = 0; i < fallingHeartCount; i++) {
      fallingHearts.push(new FallingHeart());
    }

    function animate() {
      const elapsed = (Date.now() - startTime) / 1000;

      // ลอจิกการเปลี่ยนเฟสตามเวลา
      if (elapsed > 5.0 && phase === 1) {
        phase = 2; // ไปเฟสสายน้ำ
      } else if (elapsed > 9.0 && phase === 2) {
        phase = 3; // ไปเฟสฝนหัวใจตก
      }

      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, width, height);

      if (phase === 1 || phase === 2) {
        particles.forEach(p => {
          p.update();
          p.draw();
        });
      } else if (phase === 3) {
        // วาดหัวใจที่ตกลงมาจากฟ้า
        fallingHearts.forEach(fh => {
          fh.update();
          fh.draw();
        });
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
